<script>
/* ═══════════════════════════════════════════
   OGE READING TRAINER — ENGINE
   ═══════════════════════════════════════════ */
(function() {
  'use strict';

  const STORAGE_KEY = 'oge-reading-v1';
  const ANSWER_LABELS = { 1: 'True', 2: 'False', 3: 'Not stated' };
  const ANSWER_LABELS_RU = { 1: 'Верно', 2: 'Неверно', 3: 'Не сказано в тексте' };

  /* ── Data ── */
  const DATA = JSON.parse(document.getElementById('exam-data').textContent);
  const app = document.getElementById('app');

  /* ── State ── */
  let state = loadState();

  function defaultState() {
    return {
      version: 1,
      streak: { current: 0, lastDate: null, best: 0 },
      texts: {}
    };
  }

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const s = JSON.parse(raw);
        if (s.version === 1) return s;
      }
    } catch (e) {}
    return defaultState();
  }

  function saveState() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
  }

  function getTextState(slug) {
    return state.texts[slug] || { bestScore: 0, lastScore: -1, attempts: 0 };
  }

  function saveTextResult(slug, score, total) {
    const ts = getTextState(slug);
    ts.attempts = (ts.attempts || 0) + 1;
    ts.lastScore = score;
    if (score > (ts.bestScore || 0)) ts.bestScore = score;
    ts.lastAttempt = new Date().toISOString();
    state.texts[slug] = ts;

    const today = new Date().toISOString().split('T')[0];
    if (state.streak.lastDate === today) {
      /* already counted today */
    } else {
      const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
      if (state.streak.lastDate === yesterday) {
        state.streak.current++;
      } else {
        state.streak.current = 1;
      }
      state.streak.lastDate = today;
      if (state.streak.current > state.streak.best) state.streak.best = state.streak.current;
    }
    saveState();
  }

  /* ── Helpers ── */
  function getMastery(score) {
    if (score >= 7) return { level: 'diamond', label: 'Diamond', icon: '\u2728' };
    if (score >= 6) return { level: 'gold', label: 'Gold', icon: '\u2b50' };
    if (score >= 4) return { level: 'silver', label: 'Silver', icon: '\ud83e\udd48' };
    if (score >= 1) return { level: 'bronze', label: 'Bronze', icon: '\ud83e\udd49' };
    return { level: 'none', label: '', icon: '' };
  }

  function getTotalStats() {
    let totalCorrect = 0, totalAttempted = 0;
    DATA.texts.forEach(t => {
      const ts = getTextState(t.slug);
      if (ts.bestScore > 0) {
        totalCorrect += ts.bestScore;
        totalAttempted++;
      }
    });
    return { totalCorrect, totalAttempted, total: DATA.texts.length * 7 };
  }

  /* ── Highlights ── */
  const HL_KEY = 'oge-highlights-v1';

  function loadHighlights(slug) {
    try {
      const raw = localStorage.getItem(HL_KEY);
      if (raw) { const d = JSON.parse(raw); return d[slug] || []; }
    } catch (e) {}
    return [];
  }

  function saveHighlights(slug, ranges) {
    try {
      const raw = localStorage.getItem(HL_KEY);
      const d = raw ? JSON.parse(raw) : {};
      d[slug] = ranges;
      localStorage.setItem(HL_KEY, JSON.stringify(d));
    } catch (e) {}
  }

  function applyHighlights(plainText, ranges) {
    if (!ranges.length) return plainText;
    const sorted = [...ranges].sort((a, b) => a.start - b.start);
    let result = '';
    let cursor = 0;
    for (const r of sorted) {
      if (r.start > cursor) result += escHtml(plainText.slice(cursor, r.start));
      result += '<mark>' + escHtml(plainText.slice(r.start, r.end)) + '</mark>';
      cursor = r.end;
    }
    if (cursor < plainText.length) result += escHtml(plainText.slice(cursor));
    return result;
  }

  function escHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function textToParagraphs(text, slug) {
    if (!slug) return text.split('\n\n').map(p => `<p>${p}</p>`).join('');
    const ranges = loadHighlights(slug);
    const highlighted = applyHighlights(text, ranges);
    return highlighted.split('\n\n').map(p => `<p>${p}</p>`).join('');
  }

  /* Get character offset in the full plain text from a DOM selection inside .reading-text or .bottom-sheet-text */
  function getSelectionOffsets(container, plainText) {
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed || !sel.rangeCount) return null;
    const range = sel.getRangeAt(0);
    if (!container.contains(range.startContainer) || !container.contains(range.endContainer)) return null;

    const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT);
    let charPos = 0;
    let startOffset = null, endOffset = null;
    while (walker.nextNode()) {
      const node = walker.currentNode;
      const len = node.textContent.length;
      if (node === range.startContainer) startOffset = charPos + range.startOffset;
      if (node === range.endContainer) endOffset = charPos + range.endOffset;
      charPos += len;
    }
    if (startOffset === null || endOffset === null || startOffset === endOffset) return null;

    /* Map back to plain text offsets — strip paragraph join differences */
    const domText = container.textContent;
    const mapToPlain = (domOff) => {
      const domBefore = domText.slice(0, domOff);
      /* Find this substring in plainText accounting for \n\n vs rendered whitespace */
      let pi = 0, di = 0;
      while (di < domOff && pi < plainText.length) {
        if (plainText[pi] === domText[di]) { pi++; di++; }
        else if (plainText[pi] === '\n') { pi++; }
        else { di++; }
      }
      return pi;
    };
    const s = mapToPlain(startOffset);
    const e = mapToPlain(endOffset);
    if (s >= e) return null;
    return { start: s, end: e };
  }

  let currentHlSlug = null;
  let pendingSelection = null;

  function setupHighlightListener() {
    /* Store selection data IMMEDIATELY on selectionchange, before browser can clear it */
    document.addEventListener('selectionchange', () => {
      if (!currentHlSlug) { pendingSelection = null; return; }
      const sel = window.getSelection();
      if (!sel || sel.isCollapsed || !sel.rangeCount) { pendingSelection = null; updateHighlightBar(); return; }
      const selText = sel.toString().trim();
      if (!selText || selText.length < 2) { pendingSelection = null; updateHighlightBar(); return; }

      const container = document.querySelector('.reading-text') || document.querySelector('.bottom-sheet-text');
      if (!container || !container.contains(sel.anchorNode)) { pendingSelection = null; updateHighlightBar(); return; }

      const t = DATA.texts.find(x => x.slug === currentHlSlug);
      if (!t) { pendingSelection = null; updateHighlightBar(); return; }

      /* Capture offsets NOW while selection is alive */
      const offsets = getSelectionOffsets(container, t.text);
      if (offsets) {
        pendingSelection = { slug: currentHlSlug, offsets, range: sel.getRangeAt(0).cloneRange() };
      } else {
        pendingSelection = null;
      }
      updateHighlightBar();
    });
  }

  function updateHighlightBar() {
    const bar = document.getElementById('hlBar');
    if (!bar) return;
    if (pendingSelection) {
      bar.classList.add('visible');
    } else {
      bar.classList.remove('visible');
    }
  }

  window.addHighlight = function() {
    if (!pendingSelection) return;
    const { slug, offsets, range } = pendingSelection;

    /* Save to localStorage */
    const ranges = loadHighlights(slug);
    ranges.push(offsets);
    saveHighlights(slug, mergeRanges(ranges));

    /* Apply <mark> in DOM using the cloned range */
    try {
      const mark = document.createElement('mark');
      range.surroundContents(mark);
    } catch (e) {
      try {
        const mark = document.createElement('mark');
        mark.appendChild(range.extractContents());
        range.insertNode(mark);
      } catch (e2) {}
    }

    /* Cleanup */
    pendingSelection = null;
    window.getSelection().removeAllRanges();
    updateHighlightBar();
  };

  window.removeHighlightsForSlug = function(slug) {
    saveHighlights(slug, []);
    const container = document.querySelector('.reading-text') || document.querySelector('.bottom-sheet-text');
    const t = DATA.texts.find(x => x.slug === slug);
    if (container && t) container.innerHTML = textToParagraphs(t.text, slug);
  };

  function mergeRanges(ranges) {
    if (!ranges.length) return [];
    const sorted = [...ranges].sort((a, b) => a.start - b.start);
    const merged = [sorted[0]];
    for (let i = 1; i < sorted.length; i++) {
      const last = merged[merged.length - 1];
      if (sorted[i].start <= last.end) {
        last.end = Math.max(last.end, sorted[i].end);
      } else {
        merged.push({ ...sorted[i] });
      }
    }
    return merged;
  }

  setupHighlightListener();

  function getMessage(score, total) {
    const pct = score / total;
    if (pct === 1) return { title: 'Brilliant!', sub: '\u0418\u0434\u0435\u0430\u043b\u044c\u043d\u044b\u0439 \u0440\u0435\u0437\u0443\u043b\u044c\u0442\u0430\u0442! \u0422\u044b \u043e\u0442\u043b\u0438\u0447\u043d\u043e \u0440\u0430\u0437\u043e\u0431\u0440\u0430\u043b\u0430\u0441\u044c \u0432 \u0442\u0435\u043a\u0441\u0442\u0435.' };
    if (pct >= 0.85) return { title: 'Excellent!', sub: '\u041f\u043e\u0447\u0442\u0438 \u0438\u0434\u0435\u0430\u043b\u044c\u043d\u043e. \u041e\u0441\u0442\u0430\u043b\u043e\u0441\u044c \u0441\u043e\u0432\u0441\u0435\u043c \u0447\u0443\u0442\u044c-\u0447\u0443\u0442\u044c!' };
    if (pct >= 0.7) return { title: 'Well done!', sub: '\u0425\u043e\u0440\u043e\u0448\u0438\u0439 \u0440\u0435\u0437\u0443\u043b\u044c\u0442\u0430\u0442. \u041f\u043e\u043f\u0440\u043e\u0431\u0443\u0439 \u0435\u0449\u0451 \u0440\u0430\u0437 \u0434\u043b\u044f \u0438\u0434\u0435\u0430\u043b\u0430!' };
    if (pct >= 0.5) return { title: 'Good try!', sub: '\u041d\u0435\u043f\u043b\u043e\u0445\u043e! \u041f\u0435\u0440\u0435\u0447\u0438\u0442\u0430\u0439 \u0442\u0435\u043a\u0441\u0442 \u0432\u043d\u0438\u043c\u0430\u0442\u0435\u043b\u044c\u043d\u0435\u0435 \u0438 \u043f\u043e\u043f\u0440\u043e\u0431\u0443\u0439 \u0441\u043d\u043e\u0432\u0430.' };
    return { title: 'Keep going!', sub: '\u041d\u0435 \u0441\u0434\u0430\u0432\u0430\u0439\u0441\u044f! \u041f\u0440\u043e\u0447\u0438\u0442\u0430\u0439 \u0442\u0435\u043a\u0441\u0442 \u0435\u0449\u0451 \u0440\u0430\u0437 \u0438 \u043e\u0431\u0440\u0430\u0442\u0438 \u0432\u043d\u0438\u043c\u0430\u043d\u0438\u0435 \u043d\u0430 \u0434\u0435\u0442\u0430\u043b\u0438.' };
  }

  /* ── Router ── */
  function navigate(hash) {
    location.hash = hash;
  }

  function route() {
    const hash = location.hash || '#home';
    const parts = hash.replace('#', '').split('/');
    const screen = parts[0];
    const slug = parts[1] || '';

    window.scrollTo(0, 0);

    switch (screen) {
      case 'text': renderReading(slug); break;
      case 'quiz': renderQuiz(slug); break;
      case 'results': renderResults(slug); break;
      case 'progress': renderProgress(); break;
      default: renderHome();
    }
  }

  window.addEventListener('hashchange', route);

  /* ── RENDER: Home ── */
  function renderHome() {
    currentHlSlug = null;
    const stats = getTotalStats();
    const pct = stats.total > 0 ? (stats.totalCorrect / stats.total * 100) : 0;
    const streakHTML = state.streak.current > 0
      ? `<div class="home-streak">\ud83d\udd25 ${state.streak.current}-\u0439 \u0434\u0435\u043d\u044c \u043f\u043e\u0434\u0440\u044f\u0434!</div>`
      : '';

    let cardsHTML = DATA.texts.map((t, i) => {
      const ts = getTextState(t.slug);
      const m = getMastery(ts.bestScore);
      const scoreTxt = ts.bestScore > 0 ? `${ts.bestScore}/7` : '';
      const progressPct = (ts.bestScore / 7 * 100);
      const progressClass = ts.bestScore >= 6 ? 'progress-gold' : 'progress-green';
      const statusText = ts.bestScore === 0 ? '\u041d\u043e\u0432\u044b\u0439' : ts.bestScore === 7 ? 'Perfect!' : `\u041b\u0443\u0447\u0448\u0438\u0439: ${ts.bestScore}/7`;

      return `<div class="text-card" onclick="location.hash='#text/${t.slug}'" style="animation-delay:${i * 0.04}s">
        <div class="text-card-emoji">${t.emoji}</div>
        <div class="text-card-info">
          <div class="text-card-title">${t.title}</div>
          <div class="text-card-meta">${statusText}</div>
        </div>
        <div class="text-card-badge">
          ${m.level !== 'none' ? `<div class="mastery-seal mastery-${m.level}">${m.icon}</div>` : `<div class="mastery-seal mastery-none">\u2022</div>`}
        </div>
        <div class="text-card-progress"><div class="text-card-progress-fill ${progressClass}" style="width:${progressPct}%"></div></div>
      </div>`;
    }).join('');

    app.innerHTML = `
      <header class="app-header">
        <div class="app-header-inner">
          <div class="header-title">OGE Reading</div>
          <button class="header-stats" onclick="location.hash='#progress'">${stats.totalCorrect}/${stats.total}</button>
        </div>
      </header>
      <div class="screen">
        <div class="home-hero">
          <div class="home-hero-title">Reading Trainer</div>
          <div class="home-hero-sub">\u041f\u043e\u0434\u0433\u043e\u0442\u043e\u0432\u043a\u0430 \u043a \u041e\u0413\u042d \u2022 True / False / Not stated</div>
          ${streakHTML}
        </div>
        <div class="home-progress-bar"><div class="home-progress-fill" style="width:${pct}%"></div></div>
        <div class="text-list">${cardsHTML}</div>
      </div>`;
  }

  /* ── RENDER: Reading ── */
  function renderReading(slug) {
    const t = DATA.texts.find(x => x.slug === slug);
    if (!t) { navigate('#home'); return; }

    app.innerHTML = `
      <header class="app-header">
        <div class="app-header-inner">
          <button class="header-back" onclick="location.hash='#home'">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M12.5 15L7.5 10L12.5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            \u041d\u0430\u0437\u0430\u0434
          </button>
          <div class="header-title">${t.title}</div>
          <div style="width:60px"></div>
        </div>
      </header>
      <div class="screen">
        <div class="reading-header">
          <div class="reading-emoji">${t.emoji}</div>
          <div class="reading-title">${t.title}</div>
        </div>
        <div class="reading-divider"></div>
        <div class="reading-instruction">
          \u041f\u0440\u043e\u0447\u0438\u0442\u0430\u0439 \u0442\u0435\u043a\u0441\u0442. \u041e\u043f\u0440\u0435\u0434\u0435\u043b\u0438, \u043a\u0430\u043a\u0438\u0435 \u0438\u0437 \u0443\u0442\u0432\u0435\u0440\u0436\u0434\u0435\u043d\u0438\u0439 <strong>13\u201319</strong> \u0441\u043e\u043e\u0442\u0432\u0435\u0442\u0441\u0442\u0432\u0443\u044e\u0442 \u0442\u0435\u043a\u0441\u0442\u0443 (<strong>True</strong>), \u043a\u0430\u043a\u0438\u0435 \u043d\u0435 \u0441\u043e\u043e\u0442\u0432\u0435\u0442\u0441\u0442\u0432\u0443\u044e\u0442 (<strong>False</strong>), \u0430 \u043e \u0447\u0451\u043c \u0432 \u0442\u0435\u043a\u0441\u0442\u0435 \u043d\u0435 \u0441\u043a\u0430\u0437\u0430\u043d\u043e (<strong>Not stated</strong>).
        </div>
        <div class="reading-hint-hl"><span></span> Выдели текст и нажми кнопку внизу</div>
        <div class="reading-text" data-slug="${t.slug}">${textToParagraphs(t.text, t.slug)}</div>
        <button class="start-quiz-btn" onclick="location.hash='#quiz/${t.slug}'">\u041d\u0430\u0447\u0430\u0442\u044c \u0442\u0435\u0441\u0442</button>
      </div>
      <div class="highlight-bar" id="hlBar">
        <span class="highlight-bar-hint">\u0412\u044b\u0434\u0435\u043b\u0435\u043d\u043e</span>
        <button onclick="addHighlight()">\u0412\u044b\u0434\u0435\u043b\u0438\u0442\u044c</button>
      </div>`;
    currentHlSlug = t.slug;
    pendingSelection = null;
  }

  /* ── RENDER: Quiz ── */
  let quizState = {};

  function renderQuiz(slug) {
    const t = DATA.texts.find(x => x.slug === slug);
    if (!t) { navigate('#home'); return; }

    if (!quizState.slug || quizState.slug !== slug) {
      quizState = {
        slug,
        current: 0,
        answers: new Array(t.questions.length).fill(null),
        correct: new Array(t.questions.length).fill(null)
      };
    }

    renderQuizQuestion(t);
  }

  function renderQuizQuestion(t) {
    const qi = quizState.current;
    const q = t.questions[qi];
    const answered = quizState.answers[qi] !== null;

    let dotsHTML = t.questions.map((_, i) => {
      let cls = 'quiz-dot';
      if (i === qi) cls += ' active';
      else if (quizState.correct[i] === true) cls += ' correct';
      else if (quizState.correct[i] === false) cls += ' wrong';
      return `<div class="${cls}"></div>`;
    }).join('');

    let buttonsHTML = [1, 2, 3].map(ans => {
      let cls = 'answer-btn';
      if (answered) {
        cls += ' answered';
        if (quizState.answers[qi] === ans && ans === q.answer) cls = 'answer-btn selected-correct answered';
        else if (quizState.answers[qi] === ans && ans !== q.answer) cls = 'answer-btn selected-wrong answered';
        else if (ans === q.answer) cls = 'answer-btn reveal-correct answered';
      }
      return `<button class="${cls}" data-answer="${ans}" ${answered ? '' : `onclick="selectAnswer(${ans})"`}>
        <span class="answer-indicator">${ans}</span>
        <span>${ANSWER_LABELS[ans]}</span>
      </button>`;
    }).join('');

    let explanationHTML = '';
    if (answered) {
      const isCorrect = quizState.answers[qi] === q.answer;
      const quoteHTML = q.evidence ? `<div class="explanation-quote">\u201c${q.evidence}\u201d</div>` : '';
      const nextLabel = qi < t.questions.length - 1 ? '\u0421\u043b\u0435\u0434\u0443\u044e\u0449\u0438\u0439 \u0432\u043e\u043f\u0440\u043e\u0441' : '\u0420\u0435\u0437\u0443\u043b\u044c\u0442\u0430\u0442\u044b';
      explanationHTML = `
        <div class="explanation-panel">
          <div class="explanation-label">${isCorrect ? '\u2705 \u041f\u0440\u0430\u0432\u0438\u043b\u044c\u043d\u043e!' : '\u274c \u041d\u0435\u0432\u0435\u0440\u043d\u043e \u2014 \u043f\u0440\u0430\u0432\u0438\u043b\u044c\u043d\u044b\u0439 \u043e\u0442\u0432\u0435\u0442: ' + ANSWER_LABELS[q.answer]}</div>
          <div class="explanation-text">${q.explanation}</div>
          ${quoteHTML}
          <button class="quiz-next-btn" onclick="nextQuestion()">${nextLabel}</button>
        </div>`;
    }

    app.innerHTML = `
      <header class="app-header">
        <div class="app-header-inner">
          <button class="header-back" onclick="if(confirm('\u0412\u044b\u0439\u0442\u0438 \u0438\u0437 \u0442\u0435\u0441\u0442\u0430?')){location.hash='#text/${t.slug}'}">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M12.5 15L7.5 10L12.5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <div class="header-title">${t.title}</div>
          <div style="width:40px"></div>
        </div>
      </header>
      <div class="screen">
        <div class="quiz-progress">${dotsHTML}</div>
        <div class="quiz-question-num">\u0412\u043e\u043f\u0440\u043e\u0441 ${q.num}</div>
        <div class="quiz-statement">${q.statement}</div>
        <div class="quiz-answers">${buttonsHTML}</div>
        ${explanationHTML}
        ${!answered ? `<button class="show-text-btn" onclick="openTextSheet('${t.slug}')">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 6h12M3 9h12M3 12h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          \u041f\u043e\u043a\u0430\u0437\u0430\u0442\u044c \u0442\u0435\u043a\u0441\u0442
        </button>` : ''}
      </div>
      <div class="bottom-sheet-overlay" id="bsOverlay" onclick="closeTextSheet()"></div>
      <div class="bottom-sheet" id="bsSheet">
        <div class="bottom-sheet-handle"></div>
        <div class="bottom-sheet-title">${t.title}</div>
        <div class="bottom-sheet-text">${textToParagraphs(t.text, t.slug)}</div>
        <button class="bottom-sheet-close" onclick="closeTextSheet()">\u0417\u0430\u043a\u0440\u044b\u0442\u044c</button>
      </div>`;
    currentHlSlug = t.slug;
  }

  window.selectAnswer = function(ans) {
    const t = DATA.texts.find(x => x.slug === quizState.slug);
    const qi = quizState.current;
    const q = t.questions[qi];
    quizState.answers[qi] = ans;
    quizState.correct[qi] = (ans === q.answer);
    renderQuizQuestion(t);
  };

  window.nextQuestion = function() {
    const t = DATA.texts.find(x => x.slug === quizState.slug);
    if (quizState.current < t.questions.length - 1) {
      quizState.current++;
      renderQuizQuestion(t);
      window.scrollTo(0, 0);
    } else {
      const score = quizState.correct.filter(Boolean).length;
      saveTextResult(quizState.slug, score, t.questions.length);
      navigate(`#results/${quizState.slug}`);
    }
  };

  window.openTextSheet = function(slug) {
    document.getElementById('bsOverlay').classList.add('open');
    document.getElementById('bsSheet').classList.add('open');
  };
  window.closeTextSheet = function() {
    document.getElementById('bsOverlay').classList.remove('open');
    document.getElementById('bsSheet').classList.remove('open');
  };

  /* ── RENDER: Results ── */
  function renderResults(slug) {
    const t = DATA.texts.find(x => x.slug === slug);
    if (!t) { navigate('#home'); return; }

    const score = quizState.slug === slug
      ? quizState.correct.filter(Boolean).length
      : getTextState(slug).bestScore || 0;
    const total = t.questions.length;
    const pct = score / total;
    const circumference = 2 * Math.PI * 56;
    const offset = circumference * (1 - pct);
    const msg = getMessage(score, total);
    const m = getMastery(score);
    const ringColor = pct === 1 ? 'var(--gold)' : pct >= 0.7 ? 'var(--forest)' : pct >= 0.5 ? 'var(--sky)' : 'var(--coral)';

    let qListHTML = t.questions.map((q, i) => {
      const userAns = quizState.slug === slug ? quizState.answers[i] : null;
      const isCorrect = userAns === q.answer;
      const icon = userAns !== null ? (isCorrect ? '\u2713' : '\u2717') : '\u2022';
      const iconCls = userAns !== null ? (isCorrect ? 'correct' : 'wrong') : 'correct';
      return `<div class="results-q-item">
        <div class="results-q-icon ${iconCls}">${icon}</div>
        <div>
          <div class="results-q-text">${q.num}. ${q.statement}</div>
          <div class="results-q-answer">\u041e\u0442\u0432\u0435\u0442: ${ANSWER_LABELS[q.answer]} ${userAns !== null && userAns !== q.answer ? '(\u0442\u044b: ' + ANSWER_LABELS[userAns] + ')' : ''}</div>
        </div>
      </div>`;
    }).join('');

    app.innerHTML = `
      <header class="app-header">
        <div class="app-header-inner">
          <div class="header-title">\u0420\u0435\u0437\u0443\u043b\u044c\u0442\u0430\u0442\u044b</div>
        </div>
      </header>
      <div class="screen">
        <div class="results-hero">
          <div class="results-ring-wrap">
            <svg viewBox="0 0 120 120">
              <circle class="results-ring-bg" cx="60" cy="60" r="56"/>
              <circle class="results-ring-fill" cx="60" cy="60" r="56" stroke="${ringColor}"
                style="stroke-dasharray:${circumference};stroke-dashoffset:${circumference}"
                id="resultRing"/>
            </svg>
            <div class="results-score">
              <div class="results-score-num">${score}/${total}</div>
              <div class="results-score-label">\u043f\u0440\u0430\u0432\u0438\u043b\u044c\u043d\u043e</div>
            </div>
          </div>
          <div class="results-message">${msg.title}</div>
          <div class="results-sub">${msg.sub}</div>
          ${m.level !== 'none' ? `<div class="results-mastery"><span class="mastery-seal mastery-${m.level}" style="width:28px;height:28px;font-size:14px;">${m.icon}</span> ${m.label}</div>` : ''}
        </div>
        <div class="results-questions">${qListHTML}</div>
        <div class="results-actions">
          <button class="btn-primary" onclick="quizState={};location.hash='#quiz/${slug}'">\u041f\u043e\u043f\u0440\u043e\u0431\u043e\u0432\u0430\u0442\u044c \u0435\u0449\u0451 \u0440\u0430\u0437</button>
          <button class="btn-secondary" onclick="location.hash='#home'">\u041d\u0430 \u0433\u043b\u0430\u0432\u043d\u0443\u044e</button>
        </div>
      </div>
      ${pct === 1 ? '<div class="confetti-container" id="confetti"></div>' : ''}`;

    requestAnimationFrame(() => {
      const ring = document.getElementById('resultRing');
      if (ring) {
        requestAnimationFrame(() => { ring.style.strokeDashoffset = offset; });
      }
      if (pct === 1) spawnConfetti();
    });
  }

  function spawnConfetti() {
    const container = document.getElementById('confetti');
    if (!container) return;
    const colors = ['#c19a4e', '#d4b877', '#2d6a4f', '#c44536', '#457b9d', '#f0e4c8', '#1a2744'];
    for (let i = 0; i < 50; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.left = Math.random() * 100 + '%';
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
      piece.style.width = (6 + Math.random() * 8) + 'px';
      piece.style.height = (6 + Math.random() * 8) + 'px';
      piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      piece.style.animationDuration = (2 + Math.random() * 2) + 's';
      piece.style.animationDelay = Math.random() * 0.8 + 's';
      container.appendChild(piece);
    }
    setTimeout(() => { if (container) container.remove(); }, 5000);
  }

  /* ── RENDER: Progress ── */
  function renderProgress() {
    const stats = getTotalStats();
    const textsCompleted = DATA.texts.filter(t => getTextState(t.slug).bestScore > 0).length;

    let rowsHTML = DATA.texts.map(t => {
      const ts = getTextState(t.slug);
      const m = getMastery(ts.bestScore);
      return `<div class="progress-row">
        <div class="progress-row-emoji">${t.emoji}</div>
        <div class="progress-row-title">${t.title}</div>
        <div class="progress-row-score">${ts.bestScore > 0 ? ts.bestScore + '/7' : '\u2014'}</div>
        ${m.level !== 'none' ? `<div class="mastery-seal mastery-${m.level}" style="width:26px;height:26px;font-size:13px;">${m.icon}</div>` : ''}
      </div>`;
    }).join('');

    app.innerHTML = `
      <header class="app-header">
        <div class="app-header-inner">
          <button class="header-back" onclick="location.hash='#home'">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M12.5 15L7.5 10L12.5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            \u041d\u0430\u0437\u0430\u0434
          </button>
          <div class="header-title">\u041f\u0440\u043e\u0433\u0440\u0435\u0441\u0441</div>
          <div style="width:60px"></div>
        </div>
      </header>
      <div class="screen">
        <div class="progress-header">
          <div class="progress-title">\u0422\u0432\u043e\u0439 \u043f\u0440\u043e\u0433\u0440\u0435\u0441\u0441</div>
          <div class="progress-sub">\u041f\u043e\u0434\u0433\u043e\u0442\u043e\u0432\u043a\u0430 \u043a \u041e\u0413\u042d \u2022 Reading</div>
        </div>
        <div class="progress-stats">
          <div class="stat-card">
            <div class="stat-num">${stats.totalCorrect}</div>
            <div class="stat-label">\u043f\u0440\u0430\u0432\u0438\u043b\u044c\u043d\u044b\u0445</div>
          </div>
          <div class="stat-card">
            <div class="stat-num">${textsCompleted}</div>
            <div class="stat-label">\u0442\u0435\u043a\u0441\u0442\u043e\u0432</div>
          </div>
          <div class="stat-card">
            <div class="stat-num">${state.streak.best}</div>
            <div class="stat-label">\u043b\u0443\u0447\u0448\u0438\u0439 streak</div>
          </div>
        </div>
        <div class="progress-grid">${rowsHTML}</div>
        <button class="progress-reset" onclick="if(confirm('\u0421\u0431\u0440\u043e\u0441\u0438\u0442\u044c \u0432\u0435\u0441\u044c \u043f\u0440\u043e\u0433\u0440\u0435\u0441\u0441?')){state=defaultState();saveState();renderProgress();}">\u0421\u0431\u0440\u043e\u0441\u0438\u0442\u044c \u043f\u0440\u043e\u0433\u0440\u0435\u0441\u0441</button>
      </div>`;
  }

  /* Make defaultState available globally for reset */
  window.defaultState = defaultState;
  window.saveState = saveState;
  window.renderProgress = renderProgress;
  window.quizState = quizState;

  /* ── Init ── */
  route();

  /* Register service worker */
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
})();
</script>
</body>
</html>
