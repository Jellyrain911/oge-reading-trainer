<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#1a2744">
<title>OGE Reading Trainer</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   DESIGN TOKENS
   ═══════════════════════════════════════════ */
:root {
  --navy: #1a2744;
  --navy-mid: #2d3f5e;
  --navy-light: #3d5278;
  --cream: #faf6ee;
  --cream-dark: #f0e8d8;
  --cream-mid: #f5efe3;
  --gold: #c19a4e;
  --gold-light: #d4b877;
  --gold-pale: #f0e4c8;
  --forest: #2d6a4f;
  --forest-light: #40916c;
  --forest-pale: #d8f3dc;
  --coral: #c44536;
  --coral-light: #e07a5f;
  --coral-pale: #fce4e0;
  --sky: #457b9d;
  --sky-light: #6da4c2;
  --sky-pale: #dbeaf3;
  --text: #2b2d42;
  --text-mid: #555770;
  --text-light: #8d8fa3;
  --border: #e2ddd3;
  --shadow-sm: 0 1px 3px rgba(26,39,68,0.06);
  --shadow-md: 0 4px 12px rgba(26,39,68,0.08);
  --shadow-lg: 0 8px 24px rgba(26,39,68,0.12);
  --shadow-gold: 0 4px 16px rgba(193,154,78,0.2);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --font-display: 'Playfair Display', Georgia, serif;
  --font-body: 'DM Sans', system-ui, sans-serif;
  --font-reading: 'Crimson Pro', 'Georgia', serif;
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

/* ═══════════════════════════════════════════
   RESET & BASE
   ═══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html {
  font-family: var(--font-body);
  font-size: 16px;
  color: var(--text);
  background: var(--cream);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  scroll-behavior: smooth;
}
body {
  min-height: 100dvh;
  background: var(--cream);
  overscroll-behavior: none;
}
#app {
  min-height: 100dvh;
  position: relative;
}
button {
  font-family: inherit;
  font-size: inherit;
  border: none;
  cursor: pointer;
  background: none;
  color: inherit;
  -webkit-tap-highlight-color: transparent;
}
a { color: inherit; text-decoration: none; }
img { display: block; max-width: 100%; }

/* ═══════════════════════════════════════════
   SCREEN CONTAINER
   ═══════════════════════════════════════════ */
.screen {
  padding: 0 20px;
  padding-bottom: calc(24px + var(--safe-bottom));
  max-width: 640px;
  margin: 0 auto;
  animation: screenIn 0.4s var(--ease-out) both;
}
@keyframes screenIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ═══════════════════════════════════════════
   HEADER
   ═══════════════════════════════════════════ */
.app-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(250,246,238,0.88);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
}
.app-header-inner {
  max-width: 640px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.header-title {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 600;
  color: var(--navy);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.header-back {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 15px;
  font-weight: 500;
  color: var(--navy-mid);
  padding: 6px 0;
  transition: opacity 0.2s;
}
.header-back:active { opacity: 0.5; }
.header-back svg { flex-shrink: 0; }
.header-stats {
  font-size: 13px;
  font-weight: 600;
  color: var(--gold);
  background: var(--gold-pale);
  padding: 4px 10px;
  border-radius: 20px;
  white-space: nowrap;
}

/* ═══════════════════════════════════════════
   HOME SCREEN
   ═══════════════════════════════════════════ */
.home-hero {
  text-align: center;
  padding: 32px 0 8px;
}
.home-hero-title {
  font-family: var(--font-display);
  font-size: clamp(26px, 6vw, 34px);
  font-weight: 700;
  color: var(--navy);
  line-height: 1.15;
  margin-bottom: 8px;
}
.home-hero-sub {
  font-size: 15px;
  color: var(--text-mid);
  line-height: 1.4;
}
.home-progress-bar {
  margin: 20px 0 28px;
  background: var(--cream-dark);
  border-radius: 6px;
  height: 8px;
  overflow: hidden;
  position: relative;
}
.home-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--gold-light));
  border-radius: 6px;
  transition: width 0.8s var(--ease-out);
}
.home-progress-text {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  color: var(--text-mid);
  margin-top: -20px;
  margin-bottom: 24px;
  padding: 0 2px;
}
.home-streak {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 14px;
  font-weight: 600;
  color: var(--coral);
  background: var(--coral-pale);
  padding: 6px 14px;
  border-radius: 20px;
  margin-bottom: 24px;
}

/* Text cards */
.text-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding-bottom: 20px;
}
.text-card {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  transition: transform 0.2s var(--ease-out), box-shadow 0.2s;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}
.text-card:active {
  transform: scale(0.98);
}
.text-card-emoji {
  width: 52px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  background: var(--cream-mid);
  border-radius: var(--radius-md);
  flex-shrink: 0;
}
.text-card-info {
  flex: 1;
  min-width: 0;
}
.text-card-title {
  font-family: var(--font-display);
  font-size: 17px;
  font-weight: 600;
  color: var(--navy);
  line-height: 1.2;
  margin-bottom: 4px;
}
.text-card-meta {
  font-size: 13px;
  color: var(--text-light);
}
.text-card-badge {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.text-card-score {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-mid);
}
.mastery-seal {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}
.mastery-none { background: var(--cream-dark); }
.mastery-bronze { background: #e8d5b7; }
.mastery-silver { background: #dfe3e8; }
.mastery-gold { background: var(--gold-pale); box-shadow: var(--shadow-gold); }
.mastery-diamond { background: linear-gradient(135deg, #e8f0fe, #fce4ec, #e8f0fe); box-shadow: 0 2px 12px rgba(100,100,255,0.2); }

.text-card-progress {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: var(--cream-dark);
}
.text-card-progress-fill {
  height: 100%;
  border-radius: 0 3px 0 0;
  transition: width 0.6s var(--ease-out);
}
.progress-green { background: var(--forest); }
.progress-gold { background: var(--gold); }

/* ═══════════════════════════════════════════
   READING SCREEN
   ═══════════════════════════════════════════ */
.reading-header {
  text-align: center;
  padding: 28px 0 20px;
}
.reading-emoji {
  font-size: 48px;
  margin-bottom: 12px;
}
.reading-title {
  font-family: var(--font-display);
  font-size: clamp(24px, 5.5vw, 32px);
  font-weight: 700;
  color: var(--navy);
  line-height: 1.15;
  margin-bottom: 6px;
}
.reading-hint {
  font-size: 14px;
  color: var(--text-light);
  font-style: italic;
}
.reading-divider {
  width: 60px;
  height: 2px;
  background: var(--gold);
  margin: 20px auto;
  border-radius: 1px;
}
.reading-instruction {
  font-size: 14px;
  color: var(--text-mid);
  line-height: 1.5;
  padding: 14px 16px;
  background: var(--sky-pale);
  border-left: 3px solid var(--sky);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  margin-bottom: 24px;
}
.reading-text {
  font-family: var(--font-reading);
  font-size: 18px;
  line-height: 1.75;
  color: var(--text);
  text-align: justify;
  hyphens: auto;
  margin-bottom: 32px;
}
.reading-text p {
  margin-bottom: 14px;
  text-indent: 1.5em;
}
.reading-text p:first-child {
  text-indent: 0;
}
.start-quiz-btn {
  display: block;
  width: 100%;
  padding: 16px;
  font-size: 17px;
  font-weight: 600;
  color: #fff;
  background: var(--navy);
  border-radius: var(--radius-lg);
  text-align: center;
  box-shadow: var(--shadow-md);
  transition: transform 0.15s var(--ease-out), box-shadow 0.15s;
  margin-bottom: 12px;
}
.start-quiz-btn:active {
  transform: scale(0.97);
  box-shadow: var(--shadow-sm);
}

/* ═══════════════════════════════════════════
   QUIZ SCREEN
   ═══════════════════════════════════════════ */
.quiz-progress {
  display: flex;
  gap: 6px;
  padding: 20px 0 8px;
  justify-content: center;
}
.quiz-dot {
  width: 28px;
  height: 4px;
  border-radius: 2px;
  background: var(--cream-dark);
  transition: background 0.3s, transform 0.3s;
}
.quiz-dot.active { background: var(--navy); transform: scaleY(1.5); }
.quiz-dot.correct { background: var(--forest); }
.quiz-dot.wrong { background: var(--coral); }

.quiz-question-num {
  text-align: center;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-light);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 16px 0 8px;
}
.quiz-statement {
  font-family: var(--font-reading);
  font-size: 20px;
  font-weight: 500;
  line-height: 1.5;
  color: var(--navy);
  text-align: center;
  padding: 12px 8px 32px;
  min-height: 100px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.quiz-answers {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding-bottom: 16px;
}
.answer-btn {
  display: flex;
  align-items: center;
  gap: 14px;
  width: 100%;
  padding: 16px 18px;
  background: #fff;
  border: 2px solid var(--border);
  border-radius: var(--radius-lg);
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  text-align: left;
  transition: transform 0.15s var(--ease-out), border-color 0.2s, background 0.2s;
  position: relative;
  overflow: hidden;
}
.answer-btn:active:not(.answered) { transform: scale(0.97); }
.answer-btn .answer-indicator {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 700;
  flex-shrink: 0;
  transition: background 0.3s, color 0.3s;
}
.answer-btn[data-answer="1"] .answer-indicator { background: var(--forest-pale); color: var(--forest); }
.answer-btn[data-answer="2"] .answer-indicator { background: var(--coral-pale); color: var(--coral); }
.answer-btn[data-answer="3"] .answer-indicator { background: var(--sky-pale); color: var(--sky); }

.answer-btn.selected-correct {
  border-color: var(--forest);
  background: var(--forest-pale);
}
.answer-btn.selected-correct .answer-indicator { background: var(--forest); color: #fff; }
.answer-btn.selected-wrong {
  border-color: var(--coral);
  background: var(--coral-pale);
  animation: shake 0.4s var(--ease-out);
}
.answer-btn.selected-wrong .answer-indicator { background: var(--coral); color: #fff; }
.answer-btn.reveal-correct {
  border-color: var(--forest);
  background: var(--forest-pale);
}
.answer-btn.reveal-correct .answer-indicator { background: var(--forest); color: #fff; }
.answer-btn.answered {
  pointer-events: none;
  opacity: 0.6;
}
.answer-btn.selected-correct.answered,
.answer-btn.selected-wrong.answered,
.answer-btn.reveal-correct.answered { opacity: 1; }

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}

/* Explanation panel */
.explanation-panel {
  margin-top: 16px;
  padding: 18px;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md);
  animation: slideUp 0.4s var(--ease-out) both;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
.explanation-label {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-light);
  margin-bottom: 10px;
}
.explanation-text {
  font-size: 15px;
  line-height: 1.6;
  color: var(--text-mid);
  margin-bottom: 14px;
}
.explanation-quote {
  font-family: var(--font-reading);
  font-style: italic;
  font-size: 15px;
  line-height: 1.6;
  color: var(--navy);
  padding: 12px 14px;
  background: var(--cream-mid);
  border-left: 3px solid var(--gold);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  margin-bottom: 16px;
}
.quiz-next-btn {
  display: block;
  width: 100%;
  padding: 14px;
  font-size: 16px;
  font-weight: 600;
  color: #fff;
  background: var(--navy);
  border-radius: var(--radius-md);
  text-align: center;
  box-shadow: var(--shadow-sm);
  transition: transform 0.15s var(--ease-out);
}
.quiz-next-btn:active { transform: scale(0.97); }

/* Show text button */
.show-text-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  width: 100%;
  padding: 12px;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-mid);
  border: 1px dashed var(--border);
  border-radius: var(--radius-md);
  margin-top: 10px;
  transition: background 0.2s;
}
.show-text-btn:active { background: var(--cream-dark); }

/* Bottom sheet */
.bottom-sheet-overlay {
  position: fixed;
  inset: 0;
  background: rgba(26,39,68,0.3);
  z-index: 200;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.bottom-sheet-overlay.open { opacity: 1; pointer-events: auto; }
.bottom-sheet {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  max-height: 75dvh;
  background: var(--cream);
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
  box-shadow: 0 -4px 24px rgba(26,39,68,0.15);
  z-index: 201;
  transform: translateY(100%);
  transition: transform 0.35s var(--ease-out);
  overflow-y: auto;
  overscroll-behavior: contain;
  padding: 0 20px calc(20px + var(--safe-bottom));
}
.bottom-sheet.open { transform: translateY(0); }
.bottom-sheet-handle {
  width: 36px;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 10px auto 16px;
}
.bottom-sheet-title {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 600;
  color: var(--navy);
  margin-bottom: 14px;
}
.bottom-sheet-text {
  font-family: var(--font-reading);
  font-size: 16px;
  line-height: 1.7;
  color: var(--text);
  padding-bottom: 16px;
}
.bottom-sheet-text p {
  margin-bottom: 10px;
  text-indent: 1.2em;
}
.bottom-sheet-text p:first-child { text-indent: 0; }
.bottom-sheet-close {
  position: sticky;
  bottom: 0;
  display: block;
  width: 100%;
  padding: 14px;
  font-size: 15px;
  font-weight: 600;
  color: var(--navy);
  background: var(--cream);
  border-top: 1px solid var(--border);
  text-align: center;
}

/* ═══════════════════════════════════════════
   RESULTS SCREEN
   ═══════════════════════════════════════════ */
.results-hero {
  text-align: center;
  padding: 36px 0 24px;
}
.results-ring-wrap {
  position: relative;
  width: 140px;
  height: 140px;
  margin: 0 auto 20px;
}
.results-ring-wrap svg {
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
}
.results-ring-bg {
  fill: none;
  stroke: var(--cream-dark);
  stroke-width: 8;
}
.results-ring-fill {
  fill: none;
  stroke-width: 8;
  stroke-linecap: round;
  transition: stroke-dashoffset 1.2s var(--ease-out);
}
.results-score {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.results-score-num {
  font-family: var(--font-display);
  font-size: 36px;
  font-weight: 700;
  color: var(--navy);
  line-height: 1;
}
.results-score-label {
  font-size: 13px;
  color: var(--text-light);
  margin-top: 2px;
}
.results-message {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 600;
  color: var(--navy);
  margin-bottom: 6px;
}
.results-sub {
  font-size: 15px;
  color: var(--text-mid);
  line-height: 1.4;
}
.results-mastery {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 16px;
  font-size: 15px;
  font-weight: 600;
}

/* Results question list */
.results-questions {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin: 24px 0;
}
.results-q-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px;
  background: #fff;
  border-radius: var(--radius-md);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.2s;
}
.results-q-item:active { background: var(--cream-mid); }
.results-q-icon {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 14px;
}
.results-q-icon.correct { background: var(--forest-pale); color: var(--forest); }
.results-q-icon.wrong { background: var(--coral-pale); color: var(--coral); }
.results-q-text {
  font-size: 14px;
  line-height: 1.4;
  color: var(--text);
  flex: 1;
}
.results-q-answer {
  font-size: 12px;
  color: var(--text-light);
  margin-top: 4px;
}

.results-actions {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 8px;
}
.btn-primary {
  display: block;
  width: 100%;
  padding: 16px;
  font-size: 16px;
  font-weight: 600;
  color: #fff;
  background: var(--navy);
  border-radius: var(--radius-lg);
  text-align: center;
  box-shadow: var(--shadow-md);
  transition: transform 0.15s var(--ease-out);
}
.btn-primary:active { transform: scale(0.97); }
.btn-secondary {
  display: block;
  width: 100%;
  padding: 14px;
  font-size: 15px;
  font-weight: 600;
  color: var(--navy);
  background: var(--cream-dark);
  border-radius: var(--radius-lg);
  text-align: center;
  transition: transform 0.15s var(--ease-out);
}
.btn-secondary:active { transform: scale(0.97); }

/* ═══════════════════════════════════════════
   PROGRESS SCREEN
   ═══════════════════════════════════════════ */
.progress-header {
  text-align: center;
  padding: 28px 0 24px;
}
.progress-title {
  font-family: var(--font-display);
  font-size: 24px;
  font-weight: 700;
  color: var(--navy);
  margin-bottom: 4px;
}
.progress-sub {
  font-size: 14px;
  color: var(--text-mid);
}
.progress-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 24px;
}
.stat-card {
  text-align: center;
  padding: 16px 8px;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
}
.stat-num {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 700;
  color: var(--navy);
  line-height: 1;
  margin-bottom: 4px;
}
.stat-label {
  font-size: 12px;
  color: var(--text-light);
}
.progress-grid {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.progress-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
}
.progress-row-emoji { font-size: 22px; }
.progress-row-title {
  flex: 1;
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
}
.progress-row-score {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-mid);
}
.progress-reset {
  margin-top: 32px;
  padding: 12px;
  font-size: 14px;
  color: var(--coral);
  text-align: center;
  width: 100%;
  border-radius: var(--radius-md);
  transition: background 0.2s;
}
.progress-reset:active { background: var(--coral-pale); }

/* ═══════════════════════════════════════════
   CONFETTI
   ═══════════════════════════════════════════ */
.confetti-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 300;
  overflow: hidden;
}
.confetti-piece {
  position: absolute;
  width: 10px;
  height: 10px;
  top: -20px;
  animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(0) rotateZ(0deg) rotateX(0deg); opacity: 1; }
  75% { opacity: 1; }
  100% { transform: translateY(100vh) rotateZ(720deg) rotateX(360deg); opacity: 0; }
}

/* ═══════════════════════════════════════════
   UTILITY
   ═══════════════════════════════════════════ */
.stagger-1 { animation-delay: 0.05s; }
.stagger-2 { animation-delay: 0.1s; }
.stagger-3 { animation-delay: 0.15s; }
.stagger-4 { animation-delay: 0.2s; }
.stagger-5 { animation-delay: 0.25s; }
.stagger-6 { animation-delay: 0.3s; }
.stagger-7 { animation-delay: 0.35s; }
.stagger-8 { animation-delay: 0.4s; }
.stagger-9 { animation-delay: 0.45s; }

.fade-in {
  animation: fadeIn 0.5s var(--ease-out) both;
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* Responsive */
@media (min-width: 768px) {
  .text-list {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
  }
  .quiz-statement { font-size: 22px; padding: 20px 16px 40px; }
  .answer-btn { padding: 18px 20px; }
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

      "text": "Florence Nightingale was a celebrated English nurse and writer. According to a survey, British people consider her to be one of the most famous British persons along with outstanding scientists, writers and politicians.\n\nShe was born into a rich, upper-class family in 1820, in Italy. She got her name Florence after the city of her birth, as there was a tradition in her family to name the children in honour of the city they were born in. She got an all-round education and according to the family\u2019s status Florence was expected to become a faithful wife and attentive mother. However, in 1844 Florence decided to become a nurse, despite the intense anger and distress of her mother and sister. At that time nursing was seen as a job that needed neither education nor special medical skills.\n\nIn 1854 the Crimean War broke out and Florence Nightingale offered her services to the War Office and soon left for the Crimea with thirty-eight volunteer nurses. They began their work in the main British camp, in the hospital. Very soon Florence found out that hygiene was neglected, and fatal infections were common. There was no equipment to cook proper food for the patients. Florence decided to change the situation.\n\nNightingale managed to found a vast kitchen and a laundry. In addition to her nursing work, she tried to organize reading and recreation rooms for the wounded soldiers. She was on her feet for twenty hours a day and so were the other nurses. Florence was called \u2018The Lady with the Lamp\u2019 for her habit of making rounds round the hospital at night. She checked on her helpless patients.\n\nFlorence remained in the Crimea until 1856, then she returned to England. In London Florence Nightingale visited Queen Victoria and persuaded the Queen of the need to create a military hospital system. Soon Florence Nightingale set up a training school for nurses, the first nursing school in the world. It is now called The Florence Nightingale School of Nursing and Midwifery and is part of King\u2019s College in London. The annual International Nurses Day is celebrated around the world on Florence\u2019s birthday, the 12th of May.\n\nIn the Crimea camp, Nightingale got \u2018Crimean fever\u2019 and never fully recovered. By the time she was 38 years old, she was seriously ill. She left her house very rarely and had to stay in bed most of the time. Nevertheless, Florence continued her work from her bed. She wrote many books, some of them became the base of the curriculum at the Nightingale School and other British nursing schools.\n\nFlorence Nightingale died in London in 1910, at the age of ninety. The government offered to bury Florence in Westminster Abbey, but her relatives did not agree. However, the memorial service took place in St. Paul\u2019s Cathedral.\n\nFlorence Nightingale received a lot of honorable awards. Several books were written about the life of \u2018The Lady with the Lamp\u2019 and a few films were shot about her.",

<script>
/* ═══════════════════════════════════════════
   OGE READING TRAINER — ENGINE
   ═══════════════════════════════════════════ */
(function() {
  'use strict';

  const STORAGE_KEY = 'oge-reading-v1';
  const ANSWER_LABELS = { 1: 'True', 2: 'False', 3: 'Not stated' };
  const ANSWER_LABELS_RU = { 1: 'Верно', 2: 'Неверно', 3: 'Не сказано в тексте' };

  /* ── Data ── */
  const DATA = JSON.parse(document.getElementById('exam-data').textContent);
  const app = document.getElementById('app');

  /* ── State ── */
  let state = loadState();

  function defaultState() {
    return {
      version: 1,
      streak: { current: 0, lastDate: null, best: 0 },
      texts: {}
    };
  }

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const s = JSON.parse(raw);
        if (s.version === 1) return s;
      }
    } catch (e) {}
    return defaultState();
  }

  function saveState() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
  }

  function getTextState(slug) {
    return state.texts[slug] || { bestScore: 0, lastScore: -1, attempts: 0 };
  }

  function saveTextResult(slug, score, total) {
    const ts = getTextState(slug);
    ts.attempts = (ts.attempts || 0) + 1;
    ts.lastScore = score;
    if (score > (ts.bestScore || 0)) ts.bestScore = score;
    ts.lastAttempt = new Date().toISOString();
    state.texts[slug] = ts;

    const today = new Date().toISOString().split('T')[0];
    if (state.streak.lastDate === today) {
      /* already counted today */
    } else {
      const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
      if (state.streak.lastDate === yesterday) {
        state.streak.current++;
      } else {
        state.streak.current = 1;
      }
      state.streak.lastDate = today;
      if (state.streak.current > state.streak.best) state.streak.best = state.streak.current;
    }
    saveState();
  }

  /* ── Helpers ── */
  function getMastery(score) {
    if (score >= 7) return { level: 'diamond', label: 'Diamond', icon: '\u2728' };
    if (score >= 6) return { level: 'gold', label: 'Gold', icon: '\u2b50' };
    if (score >= 4) return { level: 'silver', label: 'Silver', icon: '\ud83e\udd48' };
    if (score >= 1) return { level: 'bronze', label: 'Bronze', icon: '\ud83e\udd49' };
    return { level: 'none', label: '', icon: '' };
  }

  function getTotalStats() {
    let totalCorrect = 0, totalAttempted = 0;
    DATA.texts.forEach(t => {
      const ts = getTextState(t.slug);
      if (ts.bestScore > 0) {
        totalCorrect += ts.bestScore;
        totalAttempted++;
      }
    });
    return { totalCorrect, totalAttempted, total: DATA.texts.length * 7 };
  }

  function textToParagraphs(text) {
    return text.split('\n\n').map(p => `<p>${p}</p>`).join('');
  }

  function getMessage(score, total) {
    const pct = score / total;
    if (pct === 1) return { title: 'Brilliant!', sub: '\u0418\u0434\u0435\u0430\u043b\u044c\u043d\u044b\u0439 \u0440\u0435\u0437\u0443\u043b\u044c\u0442\u0430\u0442! \u0422\u044b \u043e\u0442\u043b\u0438\u0447\u043d\u043e \u0440\u0430\u0437\u043e\u0431\u0440\u0430\u043b\u0430\u0441\u044c \u0432 \u0442\u0435\u043a\u0441\u0442\u0435.' };
    if (pct >= 0.85) return { title: 'Excellent!', sub: '\u041f\u043e\u0447\u0442\u0438 \u0438\u0434\u0435\u0430\u043b\u044c\u043d\u043e. \u041e\u0441\u0442\u0430\u043b\u043e\u0441\u044c \u0441\u043e\u0432\u0441\u0435\u043c \u0447\u0443\u0442\u044c-\u0447\u0443\u0442\u044c!' };
    if (pct >= 0.7) return { title: 'Well done!', sub: '\u0425\u043e\u0440\u043e\u0448\u0438\u0439 \u0440\u0435\u0437\u0443\u043b\u044c\u0442\u0430\u0442. \u041f\u043e\u043f\u0440\u043e\u0431\u0443\u0439 \u0435\u0449\u0451 \u0440\u0430\u0437 \u0434\u043b\u044f \u0438\u0434\u0435\u0430\u043b\u0430!' };
    if (pct >= 0.5) return { title: 'Good try!', sub: '\u041d\u0435\u043f\u043b\u043e\u0445\u043e! \u041f\u0435\u0440\u0435\u0447\u0438\u0442\u0430\u0439 \u0442\u0435\u043a\u0441\u0442 \u0432\u043d\u0438\u043c\u0430\u0442\u0435\u043b\u044c\u043d\u0435\u0435 \u0438 \u043f\u043e\u043f\u0440\u043e\u0431\u0443\u0439 \u0441\u043d\u043e\u0432\u0430.' };
    return { title: 'Keep going!', sub: '\u041d\u0435 \u0441\u0434\u0430\u0432\u0430\u0439\u0441\u044f! \u041f\u0440\u043e\u0447\u0438\u0442\u0430\u0439 \u0442\u0435\u043a\u0441\u0442 \u0435\u0449\u0451 \u0440\u0430\u0437 \u0438 \u043e\u0431\u0440\u0430\u0442\u0438 \u0432\u043d\u0438\u043c\u0430\u043d\u0438\u0435 \u043d\u0430 \u0434\u0435\u0442\u0430\u043b\u0438.' };
  }

  /* ── Router ── */
  function navigate(hash) {
    location.hash = hash;
  }

  function route() {
    const hash = location.hash || '#home';
    const parts = hash.replace('#', '').split('/');
    const screen = parts[0];
    const slug = parts[1] || '';

    window.scrollTo(0, 0);

    switch (screen) {
      case 'text': renderReading(slug); break;
      case 'quiz': renderQuiz(slug); break;
      case 'results': renderResults(slug); break;
      case 'progress': renderProgress(); break;
      default: renderHome();
    }
  }

  window.addEventListener('hashchange', route);

  /* ── RENDER: Home ── */
  function renderHome() {
    const stats = getTotalStats();
    const pct = stats.total > 0 ? (stats.totalCorrect / stats.total * 100) : 0;
    const streakHTML = state.streak.current > 0
      ? `<div class="home-streak">\ud83d\udd25 ${state.streak.current}-\u0439 \u0434\u0435\u043d\u044c \u043f\u043e\u0434\u0440\u044f\u0434!</div>`
      : '';

    let cardsHTML = DATA.texts.map((t, i) => {
      const ts = getTextState(t.slug);
      const m = getMastery(ts.bestScore);
      const scoreTxt = ts.bestScore > 0 ? `${ts.bestScore}/7` : '';
      const progressPct = (ts.bestScore / 7 * 100);
      const progressClass = ts.bestScore >= 6 ? 'progress-gold' : 'progress-green';
      const statusText = ts.bestScore === 0 ? '\u041d\u043e\u0432\u044b\u0439' : ts.bestScore === 7 ? 'Perfect!' : `\u041b\u0443\u0447\u0448\u0438\u0439: ${ts.bestScore}/7`;

      return `<div class="text-card" onclick="location.hash='#text/${t.slug}'" style="animation-delay:${i * 0.04}s">
        <div class="text-card-emoji">${t.emoji}</div>
        <div class="text-card-info">
          <div class="text-card-title">${t.title}</div>
          <div class="text-card-meta">${statusText}</div>
        </div>
        <div class="text-card-badge">
          ${m.level !== 'none' ? `<div class="mastery-seal mastery-${m.level}">${m.icon}</div>` : `<div class="mastery-seal mastery-none">\u2022</div>`}
        </div>
        <div class="text-card-progress"><div class="text-card-progress-fill ${progressClass}" style="width:${progressPct}%"></div></div>
      </div>`;
    }).join('');

    app.innerHTML = `
      <header class="app-header">
        <div class="app-header-inner">
          <div class="header-title">OGE Reading</div>
          <button class="header-stats" onclick="location.hash='#progress'">${stats.totalCorrect}/${stats.total}</button>
        </div>
      </header>
      <div class="screen">
        <div class="home-hero">
          <div class="home-hero-title">Reading Trainer</div>
          <div class="home-hero-sub">\u041f\u043e\u0434\u0433\u043e\u0442\u043e\u0432\u043a\u0430 \u043a \u041e\u0413\u042d \u2022 True / False / Not stated</div>
          ${streakHTML}
        </div>
        <div class="home-progress-bar"><div class="home-progress-fill" style="width:${pct}%"></div></div>
        <div class="text-list">${cardsHTML}</div>
      </div>`;
  }

  /* ── RENDER: Reading ── */
  function renderReading(slug) {
    const t = DATA.texts.find(x => x.slug === slug);
    if (!t) { navigate('#home'); return; }

    app.innerHTML = `
      <header class="app-header">
        <div class="app-header-inner">
          <button class="header-back" onclick="location.hash='#home'">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M12.5 15L7.5 10L12.5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            \u041d\u0430\u0437\u0430\u0434
          </button>
          <div class="header-title">${t.title}</div>
          <div style="width:60px"></div>
        </div>
      </header>
      <div class="screen">
        <div class="reading-header">
          <div class="reading-emoji">${t.emoji}</div>
          <div class="reading-title">${t.title}</div>
        </div>
        <div class="reading-divider"></div>
        <div class="reading-instruction">
          \u041f\u0440\u043e\u0447\u0438\u0442\u0430\u0439 \u0442\u0435\u043a\u0441\u0442. \u041e\u043f\u0440\u0435\u0434\u0435\u043b\u0438, \u043a\u0430\u043a\u0438\u0435 \u0438\u0437 \u0443\u0442\u0432\u0435\u0440\u0436\u0434\u0435\u043d\u0438\u0439 <strong>13\u201319</strong> \u0441\u043e\u043e\u0442\u0432\u0435\u0442\u0441\u0442\u0432\u0443\u044e\u0442 \u0442\u0435\u043a\u0441\u0442\u0443 (<strong>True</strong>), \u043a\u0430\u043a\u0438\u0435 \u043d\u0435 \u0441\u043e\u043e\u0442\u0432\u0435\u0442\u0441\u0442\u0432\u0443\u044e\u0442 (<strong>False</strong>), \u0430 \u043e \u0447\u0451\u043c \u0432 \u0442\u0435\u043a\u0441\u0442\u0435 \u043d\u0435 \u0441\u043a\u0430\u0437\u0430\u043d\u043e (<strong>Not stated</strong>).
        </div>
        <div class="reading-text">${textToParagraphs(t.text)}</div>
        <button class="start-quiz-btn" onclick="location.hash='#quiz/${t.slug}'">\u041d\u0430\u0447\u0430\u0442\u044c \u0442\u0435\u0441\u0442</button>
      </div>`;
  }

  /* ── RENDER: Quiz ── */
  let quizState = {};

  function renderQuiz(slug) {
    const t = DATA.texts.find(x => x.slug === slug);
    if (!t) { navigate('#home'); return; }

    if (!quizState.slug || quizState.slug !== slug) {
      quizState = {
        slug,
        current: 0,
        answers: new Array(t.questions.length).fill(null),
        correct: new Array(t.questions.length).fill(null)
      };
    }

    renderQuizQuestion(t);
  }

  function renderQuizQuestion(t) {
    const qi = quizState.current;
    const q = t.questions[qi];
    const answered = quizState.answers[qi] !== null;

    let dotsHTML = t.questions.map((_, i) => {
      let cls = 'quiz-dot';
      if (i === qi) cls += ' active';
      else if (quizState.correct[i] === true) cls += ' correct';
      else if (quizState.correct[i] === false) cls += ' wrong';
      return `<div class="${cls}"></div>`;
    }).join('');

    let buttonsHTML = [1, 2, 3].map(ans => {
      let cls = 'answer-btn';
      if (answered) {
        cls += ' answered';
        if (quizState.answers[qi] === ans && ans === q.answer) cls = 'answer-btn selected-correct answered';
        else if (quizState.answers[qi] === ans && ans !== q.answer) cls = 'answer-btn selected-wrong answered';
        else if (ans === q.answer) cls = 'answer-btn reveal-correct answered';
      }
      return `<button class="${cls}" data-answer="${ans}" ${answered ? '' : `onclick="selectAnswer(${ans})"`}>
        <span class="answer-indicator">${ans}</span>
        <span>${ANSWER_LABELS[ans]}</span>
      </button>`;
    }).join('');

    let explanationHTML = '';
    if (answered) {
      const isCorrect = quizState.answers[qi] === q.answer;
      const quoteHTML = q.evidence ? `<div class="explanation-quote">\u201c${q.evidence}\u201d</div>` : '';
      const nextLabel = qi < t.questions.length - 1 ? '\u0421\u043b\u0435\u0434\u0443\u044e\u0449\u0438\u0439 \u0432\u043e\u043f\u0440\u043e\u0441' : '\u0420\u0435\u0437\u0443\u043b\u044c\u0442\u0430\u0442\u044b';
      explanationHTML = `
        <div class="explanation-panel">
          <div class="explanation-label">${isCorrect ? '\u2705 \u041f\u0440\u0430\u0432\u0438\u043b\u044c\u043d\u043e!' : '\u274c \u041d\u0435\u0432\u0435\u0440\u043d\u043e \u2014 \u043f\u0440\u0430\u0432\u0438\u043b\u044c\u043d\u044b\u0439 \u043e\u0442\u0432\u0435\u0442: ' + ANSWER_LABELS[q.answer]}</div>
          <div class="explanation-text">${q.explanation}</div>
          ${quoteHTML}
          <button class="quiz-next-btn" onclick="nextQuestion()">${nextLabel}</button>
        </div>`;
    }

    app.innerHTML = `
      <header class="app-header">
        <div class="app-header-inner">
          <button class="header-back" onclick="if(confirm('\u0412\u044b\u0439\u0442\u0438 \u0438\u0437 \u0442\u0435\u0441\u0442\u0430?')){location.hash='#text/${t.slug}'}">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M12.5 15L7.5 10L12.5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <div class="header-title">${t.title}</div>
          <div style="width:40px"></div>
        </div>
      </header>
      <div class="screen">
        <div class="quiz-progress">${dotsHTML}</div>
        <div class="quiz-question-num">\u0412\u043e\u043f\u0440\u043e\u0441 ${q.num}</div>
        <div class="quiz-statement">${q.statement}</div>
        <div class="quiz-answers">${buttonsHTML}</div>
        ${explanationHTML}
        ${!answered ? `<button class="show-text-btn" onclick="openTextSheet('${t.slug}')">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 6h12M3 9h12M3 12h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          \u041f\u043e\u043a\u0430\u0437\u0430\u0442\u044c \u0442\u0435\u043a\u0441\u0442
        </button>` : ''}
      </div>
      <div class="bottom-sheet-overlay" id="bsOverlay" onclick="closeTextSheet()"></div>
      <div class="bottom-sheet" id="bsSheet">
        <div class="bottom-sheet-handle"></div>
        <div class="bottom-sheet-title">${t.title}</div>
        <div class="bottom-sheet-text">${textToParagraphs(t.text)}</div>
        <button class="bottom-sheet-close" onclick="closeTextSheet()">\u0417\u0430\u043a\u0440\u044b\u0442\u044c</button>
      </div>`;
  }

  window.selectAnswer = function(ans) {
    const t = DATA.texts.find(x => x.slug === quizState.slug);
    const qi = quizState.current;
    const q = t.questions[qi];
    quizState.answers[qi] = ans;
    quizState.correct[qi] = (ans === q.answer);
    renderQuizQuestion(t);
  };

  window.nextQuestion = function() {
    const t = DATA.texts.find(x => x.slug === quizState.slug);
    if (quizState.current < t.questions.length - 1) {
      quizState.current++;
      renderQuizQuestion(t);
      window.scrollTo(0, 0);
    } else {
      const score = quizState.correct.filter(Boolean).length;
      saveTextResult(quizState.slug, score, t.questions.length);
      navigate(`#results/${quizState.slug}`);
    }
  };

  window.openTextSheet = function(slug) {
    document.getElementById('bsOverlay').classList.add('open');
    document.getElementById('bsSheet').classList.add('open');
  };
  window.closeTextSheet = function() {
    document.getElementById('bsOverlay').classList.remove('open');
    document.getElementById('bsSheet').classList.remove('open');
  };

  /* ── RENDER: Results ── */
  function renderResults(slug) {
    const t = DATA.texts.find(x => x.slug === slug);
    if (!t) { navigate('#home'); return; }

    const score = quizState.slug === slug
      ? quizState.correct.filter(Boolean).length
      : getTextState(slug).bestScore || 0;
    const total = t.questions.length;
    const pct = score / total;
    const circumference = 2 * Math.PI * 56;
    const offset = circumference * (1 - pct);
    const msg = getMessage(score, total);
    const m = getMastery(score);
    const ringColor = pct === 1 ? 'var(--gold)' : pct >= 0.7 ? 'var(--forest)' : pct >= 0.5 ? 'var(--sky)' : 'var(--coral)';

    let qListHTML = t.questions.map((q, i) => {
      const userAns = quizState.slug === slug ? quizState.answers[i] : null;
      const isCorrect = userAns === q.answer;
      const icon = userAns !== null ? (isCorrect ? '\u2713' : '\u2717') : '\u2022';
      const iconCls = userAns !== null ? (isCorrect ? 'correct' : 'wrong') : 'correct';
      return `<div class="results-q-item">
        <div class="results-q-icon ${iconCls}">${icon}</div>
        <div>
          <div class="results-q-text">${q.num}. ${q.statement}</div>
          <div class="results-q-answer">\u041e\u0442\u0432\u0435\u0442: ${ANSWER_LABELS[q.answer]} ${userAns !== null && userAns !== q.answer ? '(\u0442\u044b: ' + ANSWER_LABELS[userAns] + ')' : ''}</div>
        </div>
      </div>`;
    }).join('');

    app.innerHTML = `
      <header class="app-header">
        <div class="app-header-inner">
          <div class="header-title">\u0420\u0435\u0437\u0443\u043b\u044c\u0442\u0430\u0442\u044b</div>
        </div>
      </header>
      <div class="screen">
        <div class="results-hero">
          <div class="results-ring-wrap">
            <svg viewBox="0 0 120 120">
              <circle class="results-ring-bg" cx="60" cy="60" r="56"/>
              <circle class="results-ring-fill" cx="60" cy="60" r="56" stroke="${ringColor}"
                style="stroke-dasharray:${circumference};stroke-dashoffset:${circumference}"
                id="resultRing"/>
            </svg>
            <div class="results-score">
              <div class="results-score-num">${score}/${total}</div>
              <div class="results-score-label">\u043f\u0440\u0430\u0432\u0438\u043b\u044c\u043d\u043e</div>
            </div>
          </div>
          <div class="results-message">${msg.title}</div>
          <div class="results-sub">${msg.sub}</div>
          ${m.level !== 'none' ? `<div class="results-mastery"><span class="mastery-seal mastery-${m.level}" style="width:28px;height:28px;font-size:14px;">${m.icon}</span> ${m.label}</div>` : ''}
        </div>
        <div class="results-questions">${qListHTML}</div>
        <div class="results-actions">
          <button class="btn-primary" onclick="quizState={};location.hash='#quiz/${slug}'">\u041f\u043e\u043f\u0440\u043e\u0431\u043e\u0432\u0430\u0442\u044c \u0435\u0449\u0451 \u0440\u0430\u0437</button>
          <button class="btn-secondary" onclick="location.hash='#home'">\u041d\u0430 \u0433\u043b\u0430\u0432\u043d\u0443\u044e</button>
        </div>
      </div>
      ${pct === 1 ? '<div class="confetti-container" id="confetti"></div>' : ''}`;

    requestAnimationFrame(() => {
      const ring = document.getElementById('resultRing');
      if (ring) {
        requestAnimationFrame(() => { ring.style.strokeDashoffset = offset; });
      }
      if (pct === 1) spawnConfetti();
    });
  }

  function spawnConfetti() {
    const container = document.getElementById('confetti');
    if (!container) return;
    const colors = ['#c19a4e', '#d4b877', '#2d6a4f', '#c44536', '#457b9d', '#f0e4c8', '#1a2744'];
    for (let i = 0; i < 50; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.left = Math.random() * 100 + '%';
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
      piece.style.width = (6 + Math.random() * 8) + 'px';
      piece.style.height = (6 + Math.random() * 8) + 'px';
      piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      piece.style.animationDuration = (2 + Math.random() * 2) + 's';
      piece.style.animationDelay = Math.random() * 0.8 + 's';
      container.appendChild(piece);
    }
    setTimeout(() => { if (container) container.remove(); }, 5000);
  }

  /* ── RENDER: Progress ── */
  function renderProgress() {
    const stats = getTotalStats();
    const textsCompleted = DATA.texts.filter(t => getTextState(t.slug).bestScore > 0).length;

    let rowsHTML = DATA.texts.map(t => {
      const ts = getTextState(t.slug);
      const m = getMastery(ts.bestScore);
      return `<div class="progress-row">
        <div class="progress-row-emoji">${t.emoji}</div>
        <div class="progress-row-title">${t.title}</div>
        <div class="progress-row-score">${ts.bestScore > 0 ? ts.bestScore + '/7' : '\u2014'}</div>
        ${m.level !== 'none' ? `<div class="mastery-seal mastery-${m.level}" style="width:26px;height:26px;font-size:13px;">${m.icon}</div>` : ''}
      </div>`;
    }).join('');

    app.innerHTML = `
      <header class="app-header">
        <div class="app-header-inner">
          <button class="header-back" onclick="location.hash='#home'">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M12.5 15L7.5 10L12.5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            \u041d\u0430\u0437\u0430\u0434
          </button>
          <div class="header-title">\u041f\u0440\u043e\u0433\u0440\u0435\u0441\u0441</div>
          <div style="width:60px"></div>
        </div>
      </header>
      <div class="screen">
        <div class="progress-header">
          <div class="progress-title">\u0422\u0432\u043e\u0439 \u043f\u0440\u043e\u0433\u0440\u0435\u0441\u0441</div>
          <div class="progress-sub">\u041f\u043e\u0434\u0433\u043e\u0442\u043e\u0432\u043a\u0430 \u043a \u041e\u0413\u042d \u2022 Reading</div>
        </div>
        <div class="progress-stats">
          <div class="stat-card">
            <div class="stat-num">${stats.totalCorrect}</div>
            <div class="stat-label">\u043f\u0440\u0430\u0432\u0438\u043b\u044c\u043d\u044b\u0445</div>
          </div>
          <div class="stat-card">
            <div class="stat-num">${textsCompleted}</div>
            <div class="stat-label">\u0442\u0435\u043a\u0441\u0442\u043e\u0432</div>
          </div>
          <div class="stat-card">
            <div class="stat-num">${state.streak.best}</div>
            <div class="stat-label">\u043b\u0443\u0447\u0448\u0438\u0439 streak</div>
          </div>
        </div>
        <div class="progress-grid">${rowsHTML}</div>
        <button class="progress-reset" onclick="if(confirm('\u0421\u0431\u0440\u043e\u0441\u0438\u0442\u044c \u0432\u0435\u0441\u044c \u043f\u0440\u043e\u0433\u0440\u0435\u0441\u0441?')){state=defaultState();saveState();renderProgress();}">\u0421\u0431\u0440\u043e\u0441\u0438\u0442\u044c \u043f\u0440\u043e\u0433\u0440\u0435\u0441\u0441</button>
      </div>`;
  }

  /* Make defaultState available globally for reset */
  window.defaultState = defaultState;
  window.saveState = saveState;
  window.renderProgress = renderProgress;
  window.quizState = quizState;

  /* ── Init ── */
  route();

  /* Register service worker */
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
})();
</script>
</body>
</html>
